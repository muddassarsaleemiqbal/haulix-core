name: linter

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: write

# 🔥 Cancel previous runs on same branch
concurrency:
  group: linter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================
  # BACKEND (PHP / MAGO)
  # =========================
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      # ✅ Composer Cache
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      # ✅ Install PHP deps (fast + deterministic)
      - name: Install Dependencies
        run: |
          composer install \
            --no-interaction \
            --no-progress \
            --prefer-dist \
            --optimize-autoloader

      # ✅ Mago (already cached via vendor)
      - name: Run Mago Format
        run: ./vendor/bin/mago fmt --check

      - name: Run Mago Lint
        run: ./vendor/bin/mago lint

  # =========================
  # FRONTEND (VITE+)
  # =========================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # 🔍 Detect relevant changes
      - name: Detect Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'resources/**'
              - 'package.json'
              - 'package-lock.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'tsconfig.json'

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      # ✅ Node / Vite cache
      - name: Cache Node
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache
          key: node-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            node-${{ runner.os }}-

      # ✅ Install only if needed (huge win)
      - name: Install Dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: vp install

      # 🚫 Skip build unless required
      - name: Build Frontend
        if: steps.changes.outputs.frontend == 'true'
        run: vp build

      # ✅ Lint (can run always OR conditionally)
      - name: Run Frontend Lint
        if: steps.changes.outputs.frontend == 'true'
        run: vp check
