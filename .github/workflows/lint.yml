name: linter

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: write

concurrency:
  group: linter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================
  # BACKEND
  # =========================
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run Mago Format
        run: ./vendor/bin/mago fmt --check

      - name: Run Mago Lint
        run: ./vendor/bin/mago lint

  # =========================
  # FRONTEND (FIXED)
  # =========================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # 🔍 Detect changes
      - name: Detect Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'resources/**'
              - 'package.json'
              - 'package-lock.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'tsconfig.json'
              - 'app/**'         # ⚠️ Laravel code affects Wayfinder
              - 'routes/**'      # ⚠️ critical
              - 'composer.lock'  # ⚠️ backend changes affect build

      # ✅ PHP REQUIRED
      - name: Setup PHP
        if: steps.changes.outputs.frontend == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      # ✅ Composer cache (needed for artisan)
      - name: Cache Composer
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Install PHP Dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: composer install --no-interaction --no-progress --prefer-dist

      # ✅ Node setup
      - name: Setup Vite+
        if: steps.changes.outputs.frontend == 'true'
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24

      # ✅ Node cache
      - name: Cache Node
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache
          key: node-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml') }}

      - name: Install Node Dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: vp install

      # ⚠️ This now works because PHP + vendor exists
      - name: Build Frontend
        if: steps.changes.outputs.frontend == 'true'
        run: vp build

      - name: Run Frontend Lint
        if: steps.changes.outputs.frontend == 'true'
        run: vp check
